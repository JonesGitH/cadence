    * { box-sizing: border-box; margin: 0; padding: 0; }

    h1 { color: #94a3b8; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 32px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }

    .card { background: #1e293b; border-radius: 14px; overflow: hidden; border: 1px solid #334155; }
    .card-header { padding: 14px 18px 10px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: baseline; }
    .card-num { font-size: 0.65rem; font-weight: 700; color: #64748b; letter-spacing: 0.08em; }
    .card-name { font-size: 0.8rem; font-weight: 600; color: #e2e8f0; }
    .card-note { font-size: 0.65rem; color: #64748b; text-align: right; max-width: 160px; line-height: 1.3; }

    /* Swatches */
    .swatches { display: flex; padding: 12px 18px; gap: 8px; }
    .sw { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
    .sw-box { width: 100%; height: 32px; border-radius: 6px; }
    .sw-label { font-size: 0.55rem; color: #64748b; font-weight: 500; letter-spacing: 0.05em; }
    .sw-hex { font-size: 0.6rem; color: #94a3b8; font-family: monospace; }

    /* Mini mock UI */
    .mock { margin: 0 18px 18px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
    .mock-nav { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
    .mock-nav-logo { font-size: 0.78rem; font-weight: 700; }
    .mock-nav-links { display: flex; gap: 14px; }
    .mock-nav-links span { font-size: 0.65rem; opacity: 0.7; }
    .mock-nav-links span.active { opacity: 1; font-weight: 600; }

    .mock-body { padding: 14px; display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .mock-widget { border-radius: 8px; padding: 12px; }
    .mock-widget-val { font-size: 1.2rem; font-weight: 800; }
    .mock-widget-label { font-size: 0.6rem; margin-top: 2px; opacity: 0.7; }
    .mock-widget-tag { display: inline-block; margin-top: 6px; font-size: 0.55rem; font-weight: 600; padding: 2px 6px; border-radius: 99px; }

    .mock-footer { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.06); }
    .mock-footer-text { font-size: 0.65rem; opacity: 0.7; }
    .mock-btn { font-size: 0.65rem; font-weight: 700; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; }

function luminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const toLinear = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*toLinear(r) + 0.7152*toLinear(g) + 0.0722*toLinear(b);
}
function readable(hex) {
  return luminance(hex) > 0.35 ? '#111' : '#fff';
}
